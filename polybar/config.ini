[bar/top]
width = 100%
height = 24
offset-y = 0
background = #1a1a1a00
foreground = #f0f0f0
radius = 0
border-size = 0

font-0 = JetBrainsMono Nerd Font:pixelsize=10;3
font-1 = JoyPixels:pixelsize=12;3

modules-left = bspwm tray network
modules-center = date 
modules-right = cpu igpu gpu memory nvme layout brightness pulseaudio volpopup battery batterypopup

wm-restack = bspwm

[module/bspwm]
type = internal/bspwm

ws-icon-0 = I;I
ws-icon-1 = II;II
ws-icon-2 = III;III
ws-icon-3 = IV;IV
ws-icon-4 = V;V
ws-icon-5 = VI;VI
ws-icon-6 = VII;VII
ws-icon-7 = VIII;VIII
ws-icon-8 = IX;IX
ws-icon-9 = X;X
ws-icon-default = •

label-focused = %icon%
label-focused-background = #6272a4
label-focused-foreground = #adb5cf
label-focused-padding = 2

label-occupied = %icon%
label-occupied-background = #2e364f
label-occupied-foreground = #6272a4
label-occupied-padding = 2

label-urgent = %icon%
label-urgent-background = #666600
label-urgent-foreground = #cccc00
label-urgent-padding = 2

label-empty = %icon%
label-empty-foreground = #adb5cf
label-empty-padding = 2

[module/tray]
type = internal/tray
tray-size = 70%
tray-padding = 4

[module/date]
type = internal/date
interval = 60
date = %b %d %a  %H:%M
label = " %date%  "
label-foreground = #ebedf3

[module/cpu]
type = custom/script
exec = ~/.config/polybar/scripts/cpu-intel.sh
interval = 1
label = %{F#33ccff}%output%%{F-}

[module/igpu]
type = custom/script
exec = ~/.config/polybar/scripts/igpu-intel.sh
interval = 2
label = %{F#00ffff}%output%%{F-}

[module/gpu]
type = custom/script
exec = ~/.config/polybar/scripts/gpu-nvidia.sh
interval = 2
label = %{F#00ff00}%output%%{F-}

[module/memory]
type = custom/script
exec = ~/.config/polybar/scripts/ram-swap-bar.sh
interval = 2
label = "%output%"

[module/nvme]
type = custom/script
exec = ~/.config/polybar/scripts/nvme-samsung.sh
interval = 5
label = %output%

[module/layout]
type = custom/script
exec = xkb-switch -p | tr '[:lower:]' '[:upper:]' || setxkbmap -query | awk '/layout/{print toupper($2)}'
interval = 0.5
click-left = ~/.config/polybar/scripts/switch-layout.sh
label = "%{F#ebedf3}%output%%{F-}"

[module/brightness]
type = custom/script
exec = brightnessctl -m | cut -d, -f4 | tr -d '%'
interval = 1
label = "%{F#adb5cf} 󰃞 %output%%%{F-} "

[module/pulseaudio]
type = internal/pulseaudio
interval = 1
format-volume = <ramp-volume>
format-muted = <label-muted>

label-muted = %{F#ff4000}󰝟 %{F-}

ramp-volume-0 = %{F#adb5cf}󰸈 %{F-}
ramp-volume-1 = %{F#adb5cf}󰕿 %{F-}
ramp-volume-2 = %{F#adb5cf}󰖀 %{F-}
ramp-volume-3 = %{F#adb5cf}󱄠 %{F-}
ramp-volume-4 = %{F#adb5cf}󰕾 %{F-}

click-middle = pavucontrol
click-right = ~/.config/polybar/scripts/volume-pipewire.sh
scroll-up = wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
scroll-down = wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%-

[module/volpopup]
type = custom/script
exec = cat ~/.config/polybar/scripts/vol-popup
tail = true
interval = 1

click-middle = pavucontrol
click-left = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
click-right = ~/.config/polybar/scripts/volume-pipewire.sh
scroll-up = wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
scroll-down = wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%-

[module/battery]
type = custom/script
exec = ~/.config/polybar/scripts/battery-master.sh
interval = 5

click-left  = ~/.config/polybar/scripts/battery-info.sh
click-right = ~/.config/polybar/scripts/battery-popup.sh

[module/batterypopup]
type = custom/script
exec = cat ~/.config/polybar/scripts/battery-popup
tail = true
interval = 1

[module/network]
type = custom/script
exec = ~/.config/polybar/scripts/wifi-smart.sh
interval = 2
label = %output%