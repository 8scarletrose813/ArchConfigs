[bar/top]
width = 100%
height = 30
offset-y = 0
background = #1a1a1a00
foreground = #f0f0f0
radius = 0
border-size = 0

font-0 = JetBrainsMono Nerd Font:pixelsize=10;3
font-1 = JoyPixels:pixelsize=12;3
font-2 = FontAwesome6Free:pixelsize=12;3
font-3 = FontAwesome6Brands:pixelsize=12;3

tray-position = center
tray-padding = 4

modules-left = bspwm date network
modules-right = cpu igpu gpu memory nvme layout brightness volume battery 

wm-restack = bspwm

[module/bspwm]
type = internal/bspwm

ws-icon-0 = I;I
ws-icon-1 = II;II
ws-icon-2 = III;III
ws-icon-3 = IV;IV
ws-icon-4 = V;V
ws-icon-5 = VI;VI
ws-icon-6 = VII;VII
ws-icon-7 = VIII;VIII
ws-icon-8 = IX;IX
ws-icon-9 = X;X
ws-icon-default = •

label-focused = %icon%
label-focused-background = #6272a4
label-focused-foreground = #adb5cf
label-focused-padding = 2

label-occupied = %icon%
label-occupied-background = #2e364f
label-occupied-foreground = #6272a4
label-occupied-padding = 2

label-urgent = %icon%
label-urgent-background = #666600
label-urgent-foreground = #cccc00
label-urgent-padding = 2

label-empty = %icon%
label-empty-foreground = #adb5cf
label-empty-padding = 2

[module/date]
type = internal/date
interval = 60
date = %b %d %a  %H:%M
label = " %date%  "
label-foreground = #ebedf3

[module/cpu]
type = custom/script
exec = ~/.config/polybar/scripts/cpu-intel.sh
interval = 1
label = %{F#33ccff}%output%%{F-}

[module/igpu]
type = custom/script
exec = ~/.config/polybar/scripts/igpu-intel.sh
interval = 2
label = %{F#00ffff}%output%%{F-}

[module/gpu]
type = custom/script
exec = ~/.config/polybar/scripts/gpu-nvidia.sh
interval = 2
label = %{F#00ff00}%output%%{F-}

[module/memory]
type = custom/script
exec = ~/.config/polybar/scripts/ram-swap-bar.sh
interval = 2
label = "%output%"

[module/nvme]
type = custom/script
exec = ~/.config/polybar/scripts/nvme-samsung.sh
interval = 5
label = %output%

[module/layout]
type = custom/script
exec = xkb-switch -p | tr '[:lower:]' '[:upper:]' || setxkbmap -query | awk '/layout/{print toupper($2)}'
interval = 0.5
click-left = ~/.config/polybar/scripts/switch-layout.sh
label = "%{F#ebedf3}%output%%{F-}"

[module/brightness]
type = custom/script
exec = brightnessctl -m | cut -d, -f4 | tr -d '%'
interval = 1
label = "%{F#adb5cf} 󰃞 %output%%%{F-} "

[module/volume]
type = internal/volume
label-volume = "󰕾 %percentage%%"
label-volume-foreground = #adb5cf
label-muted = "󰖁 muted"
label-muted-foreground = #ff4000

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 100
poll-interval = 5

format-charging    = <animation-charging> <label-charging>
format-discharging = <ramp-capacity><label-discharging>
format-full        = <label-full>

animation-charging-0  = 󰢟
animation-charging-1  = 󰢜
animation-charging-2  = 󰂆
animation-charging-3  = 󰂇
animation-charging-4  = 󰂈
animation-charging-5  = 󰢝
animation-charging-6  = 󰂉
animation-charging-7  = 󰢞
animation-charging-8  = 󰂊
animation-charging-9  = 󰂋
animation-charging-10 = 󰂅
animation-charging-framerate = 600
animation-charging-foreground = #cccc00

ramp-capacity-0 = 󰂃
ramp-capacity-1 = 󰁺
ramp-capacity-2 = 󰁻
ramp-capacity-3 = 󰁼
ramp-capacity-4 = 󰁽
ramp-capacity-5 = 󰁾
ramp-capacity-6 = 󰁿
ramp-capacity-7 = 󰂀
ramp-capacity-8 = 󰂁
ramp-capacity-9 = 󰂂
ramp-capacity-foreground = #ff4000

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = 󰁹 100%

label-charging-foreground = #cccc00
label-discharging-foreground = #ff4000
label-full-foreground = #ebedf3

click-left = kitty -e "acpi -V; echo; upower -i /org/freedesktop/UPower/devices/battery_BAT0 | grep -E 'state|time to|percentage'; read -n 1"

format-charging-padding = 1
format-discharging-padding = 1
format-full-padding = 1

[module/network]
type = custom/script
exec = ~/.config/polybar/scripts/wifi-smart.sh
interval = 2
label = %output%