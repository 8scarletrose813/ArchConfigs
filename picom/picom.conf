backend = "glx";
vsync = true;
use-damage = true;
xrender-sync-fence = true;

shadow = true;
shadow-radius = 20;
shadow-opacity = 0.6;
shadow-offset-x = -16;
shadow-offset-y = -16;
shadow-blur = "sigma:14";
shadow-color = "#000000";
shadow-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'",
  "class_g = 'rofi'",
  "_GTK_FRAME_EXTENTS@:c"
];

corner-radius = 16;
round-borders = 1;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'"
];

inactive-opacity = 0.4;
frame-opacity = 0.94;
opacity-rule = [
  "90:class_g = ' kitty' && focused",
  "80:class_g = ' kitty' && !focused",
  "100:class_g = 'Polybar'"
];

fading = true;
fade-delta = 5;
fade-in-step = 0.04;
fade-out-step = 0.04;
no-fading-openclose = false;

blur-method = "dual_kawase";
blur-strength = 6;
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'",
  "_GTK_FRAME_EXTENTS@:c"
];

detect-client-opacity = true;
detect-rounded-corners = true;
detect-transient = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;