env = WLR_DRM_DEVICES,/dev/dri/card1
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland

autogenerated = 0
monitor = ,preferred,auto,1

$terminal = kitty
$fileManager = nemo
$menu = rofi -show drun
$mainMod = SUPER

exec-once = waybar
exec-once = flameshot
exec-once = swaybg -c 0f1714

general {
	gaps_in = 12
	gaps_out = 12
	border_size = 0
	allow_tearing = false
	layout = dwindle
}

decoration {
	rounding = 0
	active_opacity = 0.96
	inactive_opacity = 0.63

	shadow {
		enabled = true
		range = 18
		render_power = 3
		color = rgba(0,0,0,0.7)
	}

	blur {
		enabled = true
		size = 14
		passes = 4
		vibrancy = 0.18
		vibrancy_darkness = 0.9
		noise = 0.03
		contrast = 1.05
		brightness = 0.98
		special = true
		popups = true
	}
}

misc {
	force_default_wallpaper = 0
	disable_hyprland_logo = true
}

animations {
	enabled = true

	bezier = softOut, 0.22, 1, 0.36, 1
	bezier = softInOut, 0.65, 0.05, 0.36, 1
	bezier = glide, 0.4, 0, 0.2, 1
	bezier = silk, 0.25, 0.8, 0.25, 1
	bezier = snap, 0.15, 0, 0.1, 1

	animation = global, 1, 12, softOut

	animation = border, 1, 7, silk
	animation = windows, 1, 6, softOut
	animation = windowsIn, 1, 5, glide, popin 82%
	animation = windowsOut, 1, 3, snap, popin 82%

	animation = fadeIn, 1, 2.4, softInOut
	animation = fadeOut, 1, 2.2, softInOut
	animation = fade, 1, 3.6, glide

	animation = layers, 1, 5, softOut
	animation = layersIn, 1, 4.5, glide, fade
	animation = layersOut, 1, 3, snap, fade
	animation = fadeLayersIn, 1, 2.2, softInOut
	animation = fadeLayersOut, 1, 2, softInOut

	animation = workspaces, 1, 3.2, silk, slide
}

dwindle {
	pseudotile = true
	preserve_split = true
	smart_split = false
	smart_resizing = true
}

input {
	kb_layout = us,gr,ru,ua
	kb_options = grp:alt_shift_toggle
	follow_mouse = 0
	sensitivity = 0

	touchpad {
		natural_scroll = true
	}
}

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, D, exec, $menu
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, exec, copyq menu

bind = $mainMod ALT, Q, exit
bind = $mainMod ALT, R, exec, hyprctl reload
bind = $mainMod, Q, killactive
bind = $mainMod, F, fullscreen
bind = $mainMod, S, togglefloating
bind = $mainMod, T, togglespecialworkspace, magic
bind = $mainMod, M, layoutmsg, swapwithmaster
bind = $mainMod, P, pseudo

bind = , Print, exec, flameshot gui

bind = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bind = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioPlay, exec, playerctl play-pause

bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r

bind = $mainMod ALT, H, resizeactive, -20 0
bind = $mainMod ALT, J, resizeactive, 0 20
bind = $mainMod ALT, K, resizeactive, 0 -20
bind = $mainMod ALT, L, resizeactive, 20 0

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

windowrulev2 = float,class:^(Gimp)$
windowrulev2 = workspace 8,class:^(Gimp)$
windowrulev2 = float,class:^(mplayer2|floating)$
windowrulev2 = stayfocused,class:^(steam_proton|wine|proton)$
