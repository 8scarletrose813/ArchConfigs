# #############################################################################
# HYPRLAND CONFIG - BSPWM → HYPRLAND (тёмная тема Polybar + все твои бинды)
# #############################################################################

autogenerated = 0

################
### MONITORS ###
################

# Первый монитор (как bspwm query -M | head -n1), 10 десктопов I-X
monitor=,preferred,auto,1  # auto scale, pos 0,0
# monitor=DP-1,1920x1080@144,1920x0,1  # Второй монитор если есть (раскомментируй)

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = nemo
$menu = rofi -show drun

#################
### AUTOSTART ###
#################

# Waybar вместо polybar
exec-once = waybar & 

# Обои как feh (твой ~/Pictures/wallpapers/0.jpg)
exec-once = hyprpaper &

# Сеть (если nm-applet)
exec-once = nm-applet &

# Убедись, что sxhkd/picom НЕ запускаются!
# pkill -x sxhkd; pkill -x polybar; pkill -x picom

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland
env = SDL_VIDEODRIVER,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 12        # window_gap из bspwmrc
    gaps_out = 12
    border_size = 2     # border_width из bspwmrc
    
    # ЦВЕТА ИЗ POLYBAR (тёмная тема, НИКАКОЙ радуги!)
    col.active_border  = #6272a4 #adb5cf 45deg  # focused как ws-icon-focused
    col.inactive_border = #2e364f              # occupied
    
    col.active_border_urgent = #666600 #cccc00  # urgent из polybar
    
    resize_on_border = true
    allow_tearing = false
    layout = dwindle    # tiled как в bspwm (split_ratio 0.52 ниже)
    
    # Smart gaps (0 gaps когда 1 окно, раскомментируй для ws)
    # workspace = 1, gapsout:0, gapsin:0
    # workspace = name:^f[1]$, gapsout:0, gapsin:0
}

decoration {
    rounding = 16       # corner-radius из picom
    active_opacity = 0.94
    inactive_opacity = 0.8  # 0.4 было слишком прозрачно
    
    # ТЕНИ ИЗ PICOM (shadow-radius=20, opacity=0.6)
    shadow = true
    shadow_range = 20
    shadow_render_power = 3
    col.shadow = rgba(000000dd)  # #000000 87% opacity
    
    # BLUR ИЗ PICOM (dual_kawase strength=6)
    blur {
        enabled = true
        size = 6
        passes = 2
        vibrancy = 0.2
        ignore_opacity = true
    }
    
    drop_shadow = true
    shadow_ignore_windowrules = true
}

animations {
    enabled = true
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1
    bezier = quick, 0.15, 0, 0.1, 1
    
    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
}

dwindle {
    pseudotile = true       # mainMod + P
    preserve_split = true   # split_ratio 0.52 как bspwm
    smart_split = false
    smart_resizing = true
}

master {
    new_status = master
    orientation = west
}

misc {
    force_default_wallpaper = 0  # Твои обои
    disable_hyprland_logo = true
    mouse_move Enables = true
    key_press_ignore_list = 144,16
}

#############
### INPUT ###
#############

input {
    kb_layout = us,gr,ru,ua              # ТВОЙ setxkbmap из bspwmrc
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle    # Alt+Shift переключение (работает!)
    kb_rules =

    follow_mouse = true                  # focus_follows_pointer из bspwmrc
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

gesture {
    sensitivity = 1.0
    workspace_swipe = true
    workspace_swipe_fingers = 3
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Терминал / лаунчер / файловый менеджер (sxhkdrc)
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, d, exec, $menu
bind = $mainMod, e, exec, $fileManager
bind = $mainMod, v, exec, copyq menu

# Quit / Restart / Kill (sxhkdrc super+alt+q/r, super+w)
bind = $mainMod ALT, Q, exit
bind = $mainMod ALT, R, exec, hyprctl reload
bind = $mainMod, W, killactive
bind = $mainMod SHIFT, W, killactive  # bspc node -k

# Screenshot (super+Print)
bind = $mainMod, Print, exec, flameshot gui

# МУЛЬТИМЕДИА (brightnessctl/wpctl как в sxhkdrc + bspwmrc)
bind = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bind = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Playerctl (sxhkdrc)
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause

# STATES/FLAGS (sxhkdrc super+t/s/f/m)
bind = $mainMod, T, togglespecialfakefullscreen  # tiled → tiled (bspc -t tiled)
bind = $mainMod SHIFT, T, pseudo                 # pseudo_tiled
bind = $mainMod, S, togglefloating               # floating
bind = $mainMod, F, fullscreen                   # fullscreen
bind = $mainMod, M, layoutmsg, swapwithmaster    # monocle (bspc desktop -l next)

# FOCUS/SWAP (sxhkdrc super+{h,j,k,l} / shift)
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r

# WORKSPACES 1-10 (I-X как bspwmrc, super+{1-0}/shift)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Resize/Move (sxhkdrc super+alt+{h,j,k,l}, super+{Left,Down,Up,Right})
bind = $mainMod ALT, H, resizeactive, -20 0
bind = $mainMod ALT, J, resizeactive, 0 20
bind = $mainMod ALT, K, resizeactive, 0 -20
bind = $mainMod ALT, L, resizeactive, 20 0
bind = $mainMod ALT SHIFT, H, resizeactive, 20 0   # contract
bind = $mainMod ALT SHIFT, J, resizeactive, 0 -20
bind = $mainMod ALT SHIFT, K, resizeactive, 0 20
bind = $mainMod ALT SHIFT, L, resizeactive, -20 0

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Дополнительно (из шаблона)
bind = $mainMod, P, pseudo
bind = $mainMod, V, togglefloating
bind = $mainMod, R, exec, $menu
bind = $mainMod, C, killactive

##############################
### WINDOWS & WORKSPACES ###
##############################

# RULES ИЗ BSPWMRC (windowrulev2)
windowrulev2 = float,class:^(Gimp)$
windowrulev2 = workspace 8,class:^(Gimp)$
windowrulev2 = workspace 2,class:^(microsoft-edge)$
windowrulev2 = workspace 2,class:^(Microsoft-edge)$  # case sensitive
windowrulev2 = float,class:^(mplayer2)$
windowrulev2 = float,class:^(floating)$
windowrulev2 = focuson,class:^(Kupfer.py)$
windowrulev2 = workspace 2,class:^(google-chrome)$  # Edge/Chrome

# Ignore maximize (ИСПРАВЛЕНО)
windowrule = suppressevent maximize, class:.*

# XWayland fix
windowrule = nofocus,class:^(.*)$,title:^(.*)$,xwayland:1,floating:1,fullscreen:0,pinned:0