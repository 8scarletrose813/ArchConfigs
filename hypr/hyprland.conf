# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

autogenerated = 0 # Убрал предупреждение, теперь это твой конфиг

# https://wiki.hypr.land/Configuring/

################
### MONITORS ###
################

monitor=,preferred,auto,auto  # Как в bspwmrc, первый монитор по умолчанию

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = nemo  # Из sxhkdrc, был nemo вместо dolphin
$menu = rofi -show drun  # Из sxhkdrc, rofi вместо wofi

#################
### AUTOSTART ###
#################

exec-once = waybar  # Вместо polybar
exec-once = hyprpaper  # Для wallpaper, аналог feh
exec-once = nm-applet &  # Если нужно для сети

# Wallpaper из bspwmrc
exec-once = hyprpaper &  # Настрой в hyprpaper.conf: preload = ~/Pictures/wallpapers/0.jpg; wallpaper = ,~/Pictures/wallpapers/0.jpg

# Не запускай picom — используем встроенные эффекты
# Не запускай sxhkd — биндинги ниже

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 12  # Из bspwmrc window_gap
    gaps_out = 12

    border_size = 2  # Из bspwmrc

    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = true  # Включили, как в bspwm

    allow_tearing = false

    layout = dwindle  # Аналог tiled в bspwm
}

decoration {
    rounding = 16  # Из picom.conf
    active_opacity = 0.94  # Из picom
    inactive_opacity = 0.4

    drop_shadow = true
    shadow_range = 20  # Из picom shadow-radius
    shadow_render_power = 3
    col.shadow = rgba(000000ee)  # Из picom

    blur {
        enabled = true
        size = 6  # Из picom blur-strength
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = true  # Оставил как в шаблоне
    # ... (остальные анимации как в шаблоне)
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}

#############
### INPUT ###
#############

input {
    kb_layout = us,gr,ru,ua  # Из bspwmrc setxkbmap
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle  # Смена языка Alt+Shift
    kb_rules =

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Из sxhkdrc
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, space, exec, dmenu_run  # Program launcher
bind = $mainMod, Escape, exec, pkill -USR1 -x sxhkd  # Но sxhkd не нужен, можно убрать
bind = $mainMod ALT, q, exit,  # Quit
bind = $mainMod ALT, r, exec, hyprctl reload  # Restart
bind = $mainMod, w, killactive,  # Close
bind = $mainMod SHIFT, w, exec, bspc node -k  # Kill (но адаптировать, если нужно)
bind = $mainMod, Print, exec, flameshot gui  # Screenshot
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = $mainMod, v, exec, copyq menu
bind = $mainMod, d, exec, $menu  # Rofi
bind = $mainMod, e, exec, $fileManager  # Nemo
bind = $mainMod, m, layoutmsg, swapwithmaster  # Monocle/tiled toggle (аналог)
bind = $mainMod, g, layoutmsg, swapwithmaster  # Swap biggest
bind = $mainMod, t, pseudo,  # Tiled
bind = $mainMod SHIFT, t, pseudo,  # Pseudo tiled
bind = $mainMod, s, togglefloating,  # Floating
bind = $mainMod, f, fullscreen,  # Fullscreen
bind = $mainMod CTRL, m, exec, hyprctl dispatch togglesplit  # Marked etc., адаптировать если нужно

# Focus/swap из sxhkdrc
bind = $mainMod, h, movefocus, l  # West
bind = $mainMod, j, movefocus, d  # South
bind = $mainMod, k, movefocus, u  # North
bind = $mainMod, l, movefocus, r  # East
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, j, movewindow, d
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, l, movewindow, r

# Workspaces (10 как в bspwmrc)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
# ... до 0 для 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
# ... аналогично

# Preselect/resize из sxhkdrc
bind = $mainMod CTRL, h, resizeactive, -20 0
bind = $mainMod CTRL, j, resizeactive, 0 20
# ... etc.
bind = $mainMod ALT, h, resizeactive, -20 0  # Expand
# ... адаптировать по аналогии

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

##############################
### WINDOWS AND WORKSPACES ###
##############################

# Rules из bspwmrc
windowrulev2 = float, class:^(Gimp)$
windowrulev2 = workspace 8, class:^(Gimp)$
windowrulev2 = workspace 2, class:^(microsoft-edge)$
windowrulev2 = float, class:^(mplayer2)$
windowrulev2 = float, class:^(floating)$
windowrulev2 = float, class:^(Kupfer.py)$
windowrulev2 = nomaximizerequest, class:.*

# Ignore maximize
windowrule = suppressevent maximize, class:.*