env = WLR_DRM_DEVICES,/dev/dri/card1

autogenerated = 0

monitor=,preferred,auto,1

$terminal = kitty
$fileManager = nemo
$menu = wofi --show drun

exec-once = waybar &

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland


general {
    gaps_in = 12
    gaps_out = 12
    border_size = 2

    col.active_border = rgba(98,114,164,1.0)
    col.inactive_border = rgba(46,54,79,1.0)

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 16
    active_opacity = 0.94
    inactive_opacity = 0.8

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(0,0,0,0.6)
    }

    blur {
        enabled = true
        size = 6
        passes = 2
        vibrancy = 0.2
    }
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

animations {
    enabled = true
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1
    bezier = quick, 0.15, 0, 0.1, 1
    
    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

master {
    new_status = master
    orientation = west
}

input {
    kb_layout = us,gr,ru,ua
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules =

    follow_mouse = 0
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}


$mainMod = SUPER

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, d, exec, $menu
bind = $mainMod, e, exec, $fileManager
bind = $mainMod, v, exec, copyq menu

bind = $mainMod ALT, Q, exit
bind = $mainMod ALT, R, exec, hyprctl reload
bind = $mainMod, W, killactive
bind = $mainMod SHIFT, W, killactive

bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

bind = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bind = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause

bind = $mainMod, T, togglespecialworkspace, magic
bind = $mainMod SHIFT, T, pseudo 
bind = $mainMod, S, togglefloating
bind = $mainMod, F, fullscreen
bind = $mainMod, M, layoutmsg, swapwithmaster

bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod, Y, centerwindow

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bind = $mainMod ALT, H, resizeactive, -20 0
bind = $mainMod ALT, J, resizeactive, 0 20
bind = $mainMod ALT, K, resizeactive, 0 -20
bind = $mainMod ALT, L, resizeactive, 20 0
bind = $mainMod ALT SHIFT, H, resizeactive, 20 0   # contract
bind = $mainMod ALT SHIFT, J, resizeactive, 0 -20
bind = $mainMod ALT SHIFT, K, resizeactive, 0 20
bind = $mainMod ALT SHIFT, L, resizeactive, -20 0

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod, P, pseudo
bind = $mainMod, V, togglefloating
bind = $mainMod, C, killactive

windowrulev2 = float,class:^(Gimp)$
windowrulev2 = workspace 8,class:^(Gimp)$
windowrulev2 = float,class:^(mplayer2)$
windowrulev2 = float,class:^(floating)$

windowrulev2 = stayfocused,class:^(steam_proton|wine|proton)$