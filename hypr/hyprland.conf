env = WLR_DRM_DEVICES,/dev/dri/card1
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland

autogenerated = 0
monitor = ,preferred,auto,1

$main = SUPER
$term = kitty
$menu = rofi -show drun
$file = nautilus

general {
    gaps_in = 8
    gaps_out = 15
    border_size = 2
    col.active_border = rgba(cba6f7aa) rgba(b4befe00) rgba(cba6f7aa) 45deg
    col.inactive_border = rgba(585b7044)

    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 5
    active_opacity = 1
    inactive_opacity = 0.6
    shadow {
        enabled = true
        range = 25
        render_power = 4
        color = rgba(203, 166, 247, 0.2) 
    }

    blur {
        enabled = true
        size = 10
        passes = 1
        new_optimizations = true
        xray = true
        vibrancy = 0.2
        brightness = 1.0
        contrast = 1.2
        enabled = true
        xray = true
    }
}

animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = fluent, 0.1, 1, 0, 1

    animation = windows, 1, 5, myBezier
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 4, fluent, slide 
    animation = border, 1, 10, default
    animation = borderangle, 1, 50, default, loop
}

input {
    kb_layout = us,ru,ua
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1 # С 0 может быть неудобно в доке
    sensitivity = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    # Экономим заряд
    vfr = true 
}

# Магия для XWayland, чтобы иконки не были пиксельными
xwayland {
  force_zero_scaling = true
}

exec-once = waybar
exec-once = hyprpaper
exec-once = flameshot
exec-once = blueman-applet
exec-once = nwg-dock-hyprland -d -p bottom -i 42 -hd 0 

bind = $main, J, exec, $file
bind = $main, W, exec, $term 
bind = $main, Q, killactive
bind = $main, F, fullscreen
bind = $main, D, exec,$menu
bind = $main, S, togglefloating
bind = $main, P, pin

bind = , Print, exec, flameshot gui

bind = $main, left, movefocus, l
bind = $main, right, movefocus, r
bind = $main, up, movefocus, u
bind = $main, down, movefocus, d

bind = $main SHIFT, left, movewindow, l
bind = $main SHIFT, right, movewindow, r
bind = $main SHIFT, up, movewindow, u
bind = $main SHIFT, down, movewindow, d

bind = $main, 1, workspace, 1
bind = $main, 2, workspace, 2
bind = $main, 3, workspace, 3
bind = $main, 4, workspace, 4
bind = $main, 5, workspace, 5

bind = $main SHIFT, 1, movetoworkspace, 1
bind = $main SHIFT, 2, movetoworkspace, 2
bind = $main SHIFT, 3, movetoworkspace, 3
bind = $main SHIFT, 4, movetoworkspace, 4
bind = $main SHIFT, 5, movetoworkspace, 5

bind = $main, mouse_down, workspace, e+1
bind = $main, mouse_up, workspace, e-1

bindm = $main, mouse:272, movewindow
bindm = $main, mouse:273, resizewindow
